spring:
  profiles:
    active: local   # 默认激活本地环境，可改为 prod 上线时
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapperLocations: classpath:mapper/*.xml
  type-aliases-package: com.bgur.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl